# Example lithos-loom configuration.
#
# Copy to ~/.config/lithos-loom/config.toml (or one of the per-environment
# variants like config.dev.toml / config.prod.toml) and adjust paths to
# match your machine.
#
# Selection rules:
#   - LITHOS_LOOM_CONFIG=/abs/path.toml takes absolute precedence
#   - else, LITHOS_LOOM_ENVIRONMENT=dev picks config.dev.toml
#   - else, plain config.toml is loaded

[orchestrator]
agent_id = "lithos-orchestrator-samsara"
lithos_url = "http://localhost:8765"
# task events are pushed from <lithos_url>/events; no polling cadence.
work_dir = "/tmp/lithos-loom"
max_concurrency = 4
log_level = "info"
retain_failed_workdirs = true

[projects.lithos-lens]
repo = "/home/you/projects/lithos/code/lithos-lens"
claude_config = "/home/you/.claude-lithos"
codex_config = "/home/you/.codex-lithos"

[projects.lithos-loom]
repo = "/home/you/projects/lithos/code/lithos-loom"
claude_config = "/home/you/.claude-lithos"
codex_config = "/home/you/.codex-lithos"

# ── Routes ────────────────────────────────────────────────────────────
#
# Three bundled MVP plugins. Each route's `command` is invoked as a
# subprocess; substitution tokens {{task_json}}, {{work_dir}},
# {{result_file}} are filled in by the daemon.

[[routes]]
name = "prd-decompose"
command = "uv run python -m lithos_loom.plugins.prd_decompose --task-json {{task_json}} --work-dir {{work_dir}} --result-file {{result_file}}"
max_runtime_seconds = 1800

[routes.match]
tags = ["trigger:prd-decompose"]

[[routes]]
name = "story-implement"
command = "uv run python -m lithos_loom.plugins.story_implement --task-json {{task_json}} --work-dir {{work_dir}} --result-file {{result_file}}"
max_runtime_seconds = 7200

[routes.match]
tags = ["trigger:story-implement"]

[[routes]]
name = "story-develop"
# {{repo}} resolves per task from [projects.<slug>].repo, keyed by the
# task's metadata.project — so ONE route serves every registered project.
# (A task with no metadata.project, or an unregistered slug, is released
# with a finding rather than run against the wrong checkout.) Reviewer panel
# AND per-agent model/effort come from the project-context doc's develop_*
# metadata: develop_coder.{model,effort}, develop_reviewers[].{model,effort},
# and per-task task.metadata.develop_model / develop_effort (coder-only).
# `effort` is a level — low|medium|high|xhigh|max — not a token budget.
# See docs/SPECIFICATION.md §5.5 for the keys + resolution precedence.
# Add --open-pr to push + open a PR (and run the Copilot review round) on
# approval. The --coder-model/--coder-effort/--reviewer-model/--reviewer-effort
# flags may be appended here as a ROUTE-LEVEL DEFAULT that project/task
# metadata overrides (they fill only what metadata leaves unset), e.g.:
#   ... --repo {{repo}} --coder-effort high --reviewer-effort high
command = "uv run python -m lithos_loom.plugins.story_develop --task-json {{task_json}} --work-dir {{work_dir}} --result-file {{result_file}} --repo {{repo}}"
# A multi-round develop loop with containerised agents is slow, and
# usage-limit pauses count against the wall clock too; budget a working day.
max_runtime_seconds = 28800
# completes_task = false: an APPROVED run means a reviewed branch + PR exist,
# awaiting human merge — NOT that the task is done. The runner leaves the task
# open (marks metadata.loom_delivered so a restart won't re-develop it);
# completion happens on PR merge (github-linked tasks close via the watcher).
completes_task = false

[routes.match]
tags = ["trigger:story-develop"]

[[routes]]
name = "story-review-human"
command = "uv run python -m lithos_loom.plugins.story_review_human --task-json {{task_json}} --work-dir {{work_dir}} --result-file {{result_file}}"
# Long max_runtime — this plugin can run for days waiting on a human merge.
max_runtime_seconds = 604800
# US8: human_blocking=true surfaces tasks tagged for this route in the
# operator's Obsidian view via the obsidian-projection subscription.
# Routes default to human_blocking=false (the daemon handles them
# autonomously; nothing for the human to do).
human_blocking = true

[routes.match]
tags = ["trigger:story-review-human"]

# ── Subscriptions ─────────────────────────────────────────────────────
#
# Fire-and-forget side effects on bus events. Each [[subscriptions]]
# stanza references an `action` resolved from the
# `lithos_loom.subscriptions.handlers` Python entry-point group. Slice 0
# ships only the bundled `noop` action; real handlers
# (`obsidian-projection` etc.) arrive in Slice 1+.
#
# Filter precedence (D5): structural `match.<key>` table runs first,
# then the optional `where` Python expression. Both must hold (AND).
# The `where` scope exposes `event` and `task` (= event.payload).
#
# On persistent failure (all retry attempts exhausted), the runner posts
# a `[Friction]`-prefixed Lithos finding to the failing task by default
# (`on_persistent_failure = "friction"`). Set to "ignore" to suppress.

# [[subscriptions]]
# name = "noop-smoke"
# on = ["lithos.task.created", "lithos.task.updated"]
# action = "noop"
# # match.tags = ["debug:trace"]
# # where = "task.get('priority') == 'high'"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"        # or "linear"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0

# Obsidian projection (US8/US9) — turns lithos.task.* events into a
# markdown task list at vault_path / tasks_file. Filters via
# is_human_actionable: tasks tagged for an autonomous route are hidden;
# tasks for a human_blocking=true route (once claimed) or with no
# matching route show up. Only wired when the obsidian-sync child is
# also enabled (see [obsidian_sync] below).
#
# Subscribe to {created, updated, claimed, released, completed,
# cancelled}: claimed/released are load-bearing for D6 — without them
# the projection never surfaces tasks that become actionable only when
# a human_blocking route claims them, never refreshes the computed
# 📅 today date, and never emits the #lithos/<route-name> tag.
# [[subscriptions]]
# name = "obsidian-tasks"
# on = [
#   "lithos.task.created",
#   "lithos.task.updated",
#   "lithos.task.claimed",
#   "lithos.task.released",
#   "lithos.task.completed",
#   "lithos.task.cancelled",
# ]
# action = "obsidian-projection"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0

# ── Obsidian sync (vault host only) ───────────────────────────────────
#
# Presence of this section is the supervisor's spawn gate for the
# obsidian-sync child: include it on the host that owns the vault
# (typically samsara), omit it everywhere else. The child sleeps until
# SIGTERM in US7; US8 onwards adds the projection subscription, US15
# adds the `lithos-loom doctor` vault probe.
#
# tasks_file is relative to vault_path. resolved_ttl_days has a dual
# role: it's the max time a completed/cancelled task lingers in
# tasks_file before being dropped (US13), AND the bootstrap-replay
# window the task-archive subscription (below) looks back over on
# restart. With task-archive enabled, a resolved task is normally
# evicted from tasks_file the moment it's archived (well before the TTL);
# the TTL is the fallback for tasks that weren't archived (archive write
# failed, or task-archive isn't configured).
#
# Projection filter knobs (operator-level):
#   include_blocked — project tasks whose metadata.depends_on is set
#                     (default true; opt-out for a tighter daily view)
#   exclude_tags    — list of tags that suppress projection when present
#                     on a task (e.g. ["debug:trace", "internal"])

# [obsidian_sync]
# vault_path = "/home/you/Obsidian/Vault"
# tasks_file = "_lithos/tasks.md"
# resolved_ttl_days = 7
# include_blocked = true
# exclude_tags = []
# # Slice 4: where the project-context-projection writes per-project
# # context docs (one file per Lithos doc tagged project-context, at
# # <vault_path>/<projects_dir>/<slug>/<filename>). Default matches
# # the operator's typical "_lithos/" namespace for daemon-managed
# # files. Without project-context-projection wired (below), this is
# # unused.
# projects_dir = "_lithos/projects"

# ── Slice 4: project-context one-way pull (Lithos → vault) ─────────────
#
# Subscribes to lithos.note.{created,updated,deleted} events from the
# LithosNoteStream source (spawned only when this subscription is
# present). Bootstrap re-projects every existing project-context doc
# on startup; per-doc whole-file hash dedup makes cold restart a
# near-no-op when nothing changed.
# [[subscriptions]]
# name = "project-context"
# on = [
#   "lithos.note.created",
#   "lithos.note.updated",
#   "lithos.note.deleted",
# ]
# action = "project-context-projection"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0

# ── Slice 5: project-context bidirectional sync (vault → Lithos) ───────
#
# Subscribes to obsidian.note.modified events from the
# ObsidianDirWatcher (spawned alongside the file watcher whenever
# [obsidian_sync] is present). Pushes operator body edits back to
# Lithos via lithos_write with optimistic locking; frontmatter-only
# edits are silently absorbed (D28 invariant). Conflicts move the
# operator's body to <vault>/_lithos/conflicts/ for recovery and pull
# canonical to the original path.
#
# Requires the project-context-projection subscription above — without
# the projection populating per-doc body-hash baselines, the dir
# watcher treats every operator edit as first-sight and never emits.
# The daemon logs a startup warning if note-push is configured
# without project-context-projection.
# [[subscriptions]]
# name = "note-push"
# on = ["obsidian.note.modified"]
# action = "note-push"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0

# ── Slice 6: per-project task archive (Lithos → vault, append-only) ────
#
# Subscribes to lithos.task.{completed,cancelled}. For each terminal
# task the operator had surfaced in tasks.md, appends a Tasks-plugin
# line to <vault>/<projects_dir>/<slug>/<slug>-done.md (a durable,
# grep-/Dataview-queryable per-project history) and lets the projection
# evict the line from the global tasks.md immediately. Tasks with no /
# unknown metadata.project land in <projects_dir>/_unassigned/.
#
# Done files are vault-only and append-only — the dir watcher excludes
# the -done.md suffix so operator edits to them are inert. Deleting a
# done file loses that project's surfaced history, but you can rebuild
# the full resolved-task history any time with
# `lithos-loom project regenerate-done --slug <slug>`.
#
# Requires the obsidian-projection subscription above — the projection
# is what marks tasks "surfaced" (the archiver only archives tasks the
# operator saw) and what performs the eviction. The daemon logs a
# startup warning if task-archive is configured without it.
# [[subscriptions]]
# name = "task-archive"
# on = ["lithos.task.completed", "lithos.task.cancelled"]
# action = "task-archive"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0


# ── GitHub issue watcher (bidirectional) ──────────────────────────────
#
# Polls every project-context doc with `github_watch_enabled` metadata
# for new and updated open issues on each repo in its `github_repos`
# list (a project may map several), materialises each unseen issue as a
# Lithos task carrying metadata.github_issue_url
# (so the operator's daily Lithos view includes externally-reported
# work), and keeps the two surfaces aligned in both directions:
#
#   GH → Lithos: title / body / labels mirror to the linked task on
#   every poll; GH close mirrors to task_complete / task_cancel based
#   on the issue's state_reason. Reopen of a closed issue against a
#   terminal Lithos task posts a one-shot [ReopenRequested] finding.
#
#   Lithos → GH: task_complete / task_cancel close the linked GH
#   issue with state_reason=completed / not_planned; title renames
#   PATCH the GH issue title. Driven by lithos.task.* events on the
#   in-process bus.
#
# Per-project repos are managed via `lithos-loom project add-github-repo
# <slug> <owner/name>` / `remove-github-repo` and toggled via
# `enable-github` / `disable-github`.
#
# Per-host gate (D50): enable on at most one host. The watcher uses
# `gh auth token` at startup, so the host must have `gh` on PATH
# with the operator already logged in.
#
# Uncomment + flip `enabled = true` to activate.
# [github_watcher]
# enabled               = true
# poll_interval_seconds = 60
# coord_doc_path        = "projects/_lithos-loom-internal/github-watcher-state.md"
# resolved_replay_days  = 7
# # How far back the embedded LithosEventStream replays resolved task
# # events at bootstrap. A task closed (or renamed) while the watcher
# # was down still mirrors to GH on restart via the replay. The push
# # handler is idempotent (refetches GH before PATCH) so a too-large
# # window only costs harmless re-checks. Set to 0 to disable replay.
# reconcile_interval_minutes = 60
# # Cadence of the periodic Lithos→GH reconciliation sweep. The push
# # consumer's in-memory retry budget tops out at ~4 minutes; outages
# # longer than that drop events that only recover on next restart.
# # The sweep closes that gap while the daemon keeps running — every
# # interval it re-dispatches GH-linked Lithos tasks through the push
# # handler. Set to 0 to disable.
# pr_merge_poll_enabled = true
# # #87: the same reconcile sweep also completes non-issue-linked tasks
# # on PR merge. For each open task carrying metadata.develop_pr_url (and
# # NOT github_issue_url — those close via the issue mirror), it polls the
# # PR: merged -> task_complete; closed-unmerged or deleted -> left open
# # with a one-shot [DeliveredPRClosed] finding. Set false to run the
# # watcher for issue sync only.

# ── story-develop host-wide defaults ──────────────────────────────────
#
# Per-tool DEFAULT model for every story-develop agent of that tool, used
# when nothing more specific pins one. This is the lowest-priority layer
# of the model-resolution precedence (see docs/SPECIFICATION.md §5.5):
#
#   per-agent metadata (develop_coder.model / develop_reviewers[].model)
#     > per-task metadata.develop_model (coder only)
#     > route-level --coder-model / --reviewer-model fallback
#     > [story_develop].default_models[<tool>]   ← this section
#     > the agent CLI's own default model
#
# Keyed by TOOL (claude / codex), not by role, so a heterogeneous panel
# (#94) — say a claude coder with a codex reviewer — picks the right
# default for each agent. Only consulted by daemon-mode (route-runner)
# runs; standalone CLI runs pin models with their own flags. Model names
# are NOT validated against a catalogue (they drift), so a typo silently
# falls through to the agent default — set this once and verify a run.
# Uncomment to set host-wide defaults.
# [story_develop.default_models]
# claude = "opus"
# codex  = "gpt-5.4"
